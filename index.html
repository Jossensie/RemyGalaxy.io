<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remy Appeiron - Galactic</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Background Bintang Bergerak */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .stars {
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 444px 500px #FFF, 120px 300px #FFF, 800px 100px #FFF, 200px 900px #FFF, 500px 400px #FFF; /* Contoh sebaran bintang */
            animation: animStars 50s linear infinite;
        }

        @keyframes animStars {
            from { transform: translateY(0px); }
            to { transform: translateY(-1000px); }
        }

        /* Konten Utama */
        .content {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            color: #facc15;
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.7);
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        p {
            font-size: 1rem;
            color: #cbd5e1;
            letter-spacing: 2px;
        }

        /* Informasi Web di Bawah */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }

        .web-link {
            color: #facc15;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid #facc15;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .web-link:hover {
            background: #facc15;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars"></div>
    </div>

    <div class="content">
        <h1>REMY APPEIRON</h1>
        <p>EXPLORING THE GALAXY</p>
    </div>

    <div class="footer">
        <a href="#" class="web-link">remy-appeiron.github.io</a>
    </div>

</body>
</html>
